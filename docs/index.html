    <script>
    // Popup-Blocker: unterbindet Popup-Fenster von eingebetteten Playern
    (function() {
      var originalOpen = window.open;
      var blocked = 0;
      window.open = function() {
        blocked++;
        console.warn('[Popup-Blocker] Popup blockiert (#', blocked, ')');
        return null;
      };
      // Auch target=_blank Links abfangen
      document.addEventListener('click', function(e) {
        var target = e.target;
        while (target && target !== document) {
          if (target.tagName === 'A' && target.getAttribute('target') === '_blank') {
            var href = target.getAttribute('href');
            if (href && (href.startsWith('http') || href.startsWith('//'))) {
              console.warn('[Popup-Blocker] Externer Link blockiert:', href);
              e.preventDefault();
              e.stopPropagation();
              return;
            }
          }
          target = target.parentElement;
        }
      }, true);
    })();
  </script>
